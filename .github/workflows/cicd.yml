name: Node.js CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    # 1. Reset permissions first so the runner can safely clean the directory
    - name: Pre-clean Workspace Permissions
      run: |
        if [ -d "${{ github.workspace }}" ]; then
          sudo chown -R $USER:$USER ${{ github.workspace }}
        fi

    # 2. Backup your backend configurations
    - name: Backup Backend .env
      run: |
        if [ -f "${{ github.workspace }}/GoEventBackend/.env" ]; then
          cp "${{ github.workspace }}/GoEventBackend/.env" /tmp/goevent_env_backup
        fi

    - uses: actions/checkout@v4

    # 3. Setup Node.js with automated caching to dramatically reduce build times
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: |
          ./GoEventBackend/package-lock.json
          ./GoEventWebsite/package-lock.json

    # 4. Restore the configuration files safely
    - name: Restore Backend .env
      run: |
        if [ -f /tmp/goevent_env_backup ]; then
          mv /tmp/goevent_env_backup "${{ github.workspace }}/GoEventBackend/.env"
        fi

    # 5. Install and Build Backend (NO SUDO)
    - name: Install and Build Backend
      run: |
        cd GoEventBackend
        npm ci
        npm run build --if-present

    # 6. Install and Build Website Frontend (NO SUDO)
    - name: Install and Build Website Frontend
      run: |
        cd GoEventWebsite
        npm ci
        npm run build --if-present

    # 7. Restart Backend via PM2 as the ubuntu user
    - name: Restart Backend Application
      run: |
        cd GoEventBackend
        pm2 restart GoEvent-Backend || pm2 start app.js --name "GoEvent-Backend"

    # 8. Securely reload Nginx to push frontend changes live
    - name: Reload Nginx Frontend Server
      run: |
        sudo systemctl reload nginx

name: Node.js CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x] # Optimized to run on the current active LTS version

    steps:
    # 1. New step to reset permissions before checking out code
    - name: Pre-clean Workspace Permissions
      run: |
        if [ -d "${{ github.workspace }}" ]; then
          sudo chown -R $USER:$USER ${{ github.workspace }}
        fi

    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: './GoEventBackend/package-lock.json' # Points to your backend directory lockfile

    # 2. Navigate to your backend directory to install and build
    - name: Install and Build Backend
      run: |
        cd GoEventBackend
        npm ci
        npm run build --if-present

    # 3. Restart PM2 WITHOUT using sudo
    - name: Restart Application
      run: |
        pm2 restart GoEvent-Backend || pm2 start GoEventBackend/index.js --name "GoEvent-Backend"

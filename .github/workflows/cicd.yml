name: Node.js CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    # 1. Reset permissions first so the runner can interact with files
    - name: Pre-clean Workspace Permissions
      run: |
        if [ -d "${{ github.workspace }}" ]; then
          sudo chown -R $USER:$USER ${{ github.workspace }}
        fi

    # 2. Backup the .env from the deep backend directory
    - name: Backup Backend .env
      run: |
        if [ -f "${{ github.workspace }}/GoEventBackend/.env" ]; then
          cp "${{ github.workspace }}/GoEventBackend/.env" /tmp/goevent_env_backup
        fi

    - uses: actions/checkout@v4

    # 3. Setup Node.js ONCE (It will apply to both frontend and backend directories)
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    # 4. Restore the .env into the correct GoEventBackend directory after checkout
    - name: Restore Backend .env
      run: |
        if [ -f /tmp/goevent_env_backup ]; then
          mv /tmp/goevent_env_backup "${{ github.workspace }}/GoEventBackend/.env"
        fi

    # 5. Install and Build Backend
    - name: Install and Build Backend
      run: |
        cd GoEventBackend
        npm ci
        npm run build --if-present

    # 6. Install and Build Frontend Website
    - name: Install and Build Website Frontend
      run: |
        cd GoEventWebsite
        npm ci
        npm run build --if-present

    # 7. Restart Backend Application via PM2 WITHOUT sudo
    - name: Restart Backend Application
      run: |
        cd GoEventBackend
        pm2 restart GoEvent-Backend || pm2 start app.js --name "GoEvent-Backend"

    # 8. Reload Nginx to serve the new Frontend Website build
    - name: Reload Nginx Frontend Server
      run: |
        sudo systemctl reload nginx

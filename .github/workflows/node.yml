name: Node.js CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x,25.x]

    steps:
    # 1. Reset permissions first so the runner can interact with files
    - name: Pre-clean Workspace Permissions
      run: |
        if [ -d "${{ github.workspace }}" ]; then
          sudo chown -R $USER:$USER ${{ github.workspace }}
        fi

    # 2. Backup the .env from the deep backend directory

    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: './GoEventWebsite/package-lock.json'

    # 3. Restore the .env into the correct GoEventBackend directory after checkout

    # 4. Install and Build Backend
    - name: Install and Build frontend
      run: |
        cd GoEventWebsite
        npm ci
        npm run build --if-present

    # 5. Restart PM2 (Ensure you ran 'pm2 start app.js --name "GoEvent-Backend"' manually once via SSH first)
    - name: Restart Application
      run: |
        cd GoEventWebsite
        sudo systemctl reload nginx || pm2 restart GoEvent-Website
